<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Preview Web Component</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eff6ff;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 32px;
      }

      .page-shell {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        gap: 32px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 3vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        max-width: 680px;
        font-size: 1rem;
        line-height: 1.7;
        color: #475569;
      }

      .podcast-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.64);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        padding: 24px;
        z-index: 1000;
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-panel {
        width: 100%;
        max-width: 520px;
        border-radius: 24px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 40px 90px rgba(15, 23, 42, 0.22);
      }

      .modal-panel h2 {
        margin: 0 0 16px;
        font-size: 1.5rem;
      }

      .modal-panel p {
        margin: 0 0 12px;
        color: #334155;
      }

      .modal-close {
        margin-top: 18px;
        padding: 12px 18px;
        background: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 999px;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>Podcast Preview Web Component</h1>
        <p>
          This demo page uses the reusable `<podcast-preview>` custom element. Each card
          accepts external podcast data, renders a cover, title, genres, season count,
          and last updated date, then dispatches a custom event when clicked.
        </p>
      </header>

      <section class="podcast-grid" id="podcastGrid"></section>
    </div>

    <div class="modal-overlay" id="podcastModal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Podcast details</h2>
        <p><strong>Genres:</strong> <span id="modalGenres"></span></p>
        <p><strong>Seasons:</strong> <span id="modalSeasons"></span></p>
        <p><strong>Last updated:</strong> <span id="modalUpdated"></span></p>
        <button class="modal-close" id="modalClose" type="button">Close</button>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
