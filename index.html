<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Preview Web Component</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header>
        <h1>🎙️ PodcastApp</h1>
        <div class="header-actions">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
          </svg>
        </div>
      </header>

      <div class="filter-section">
        <span class="filter-label">Filter by:</span>
        <select class="filter-dropdown" id="genreFilter">
          <option value="">All Genres</option>
        </select>
        <select class="filter-dropdown" id="sortFilter">
          <option value="recently-updated">Recently Updated</option>
          <option value="oldest">Oldest First</option>
          <option value="most-seasons">Most Seasons</option>
          <option value="title-az">Title (A-Z)</option>
        </select>
      </div>

      <section class="podcast-grid" id="podcastGrid"></section>
    </div>

    <div class="modal-overlay" id="podcastModal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">Podcast details</h2>
          <button class="modal-close" id="modalClose" type="button" aria-label="Close podcast details">×</button>
        </div>

        <div class="modal-body">
          <div class="modal-summary">
            <img class="modal-cover" id="modalCover" src="" alt="Podcast cover" />

            <div class="modal-info">
              <div class="modal-section">
                <div class="modal-label">Description</div>
                <p class="modal-description" id="modalDescription"></p>
              </div>

              <div class="modal-section">
                <div class="modal-label">Genres</div>
                <div class="genre-list" id="modalGenreList"></div>
              </div>

              <div class="modal-meta">
                <span id="modalUpdated"></span>
              </div>
            </div>
          </div>

          <div class="modal-seasons">
            <h3>Seasons</h3>
            <div class="season-list" id="modalSeasonsList"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
